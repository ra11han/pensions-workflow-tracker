<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pensions Workflow Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{% url 'landing' %}">Workflow Tracker</a>
        <div class="d-flex">
          {% if user.is_authenticated %}
          <a class="btn btn-outline-light me-2" href="{% url 'dashboard' %}"
            >Dashboard</a
          >
          <a class="btn btn-outline-light me-2" href="{% url 'case_list' %}"
            >Cases</a
          >
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="btn btn-warning" type="submit">Logout</button>
          </form>
          {% else %}
          <a class="btn btn-outline-light me-2" href="{% url 'login' %}"
            >Login</a
          >
          <a class="btn btn-primary" href="{% url 'register' %}">Register</a>
          {% endif %}
        </div>
      </div>
    </nav>

    {% if messages %}
    <div class="container mt-3">
      {% for message in messages %}
      <div class="alert alert-info">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %} {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var tooltipTriggerList = [].slice.call(
          document.querySelectorAll('[data-bs-toggle="tooltip"]'),
        );
        tooltipTriggerList.forEach(function (tooltipTriggerEl) {
          new bootstrap.Tooltip(tooltipTriggerEl);
        });
      });
    </script>
  </body>
</html>
