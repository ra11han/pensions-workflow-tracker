{% extends 'tracker/base.html' %}
{% block content %}
<div class="container mt-4" style="max-width: 720px;">
  <h2>Delete case</h2>
  <p>Are you sure you want to delete <strong>{{ case.reference }}</strong>?</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Delete</button>
    <a class="btn btn-link" href="{% url 'case_detail' case.pk %}">Cancel</a>
  </form>
</div>
{% endblock %}
