{% extends 'tracker/base.html' %}
{% block content %}
<div class="container mt-4">
  <div class="p-4 bg-light rounded">
    <h1 class="mb-3">Pensions Workflow Tracker</h1>
    <p class="lead">A shared queue for tracking workflow cases (status, priority, scheme, assignment) with an audit trail of notes.</p>
    {% if user.is_authenticated %}
      <a class="btn btn-primary" href="{% url 'dashboard' %}">Go to dashboard</a>
    {% else %}
      <a class="btn btn-primary" href="{% url 'login' %}">Login</a>
      <a class="btn btn-outline-secondary" href="{% url 'register' %}">Register</a>
    {% endif %}
  </div>
</div>
{% endblock %}
