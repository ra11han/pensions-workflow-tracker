{% extends 'tracker/base.html' %}
{% block content %}
<div class="container mt-4" style="max-width: 920px;">
  <h2>{{ mode }} case</h2>
  <form method="post" class="mt-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-link" href="{% url 'case_list' %}">Cancel</a>
  </form>
</div>
{% endblock %}
