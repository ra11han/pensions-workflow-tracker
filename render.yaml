databases:
  - name: pensionsworkdb
    plan: free

services:
  - type: web
    name: pensions-workflow-tracker
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python -m gunicorn pensions_tracker.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pensionsworkdb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 2
      - key: SEED_DEMO_DATA
        value: true
